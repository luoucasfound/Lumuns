<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumuns Prototype — Editor IA Documentários</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Lumuns — Protótipo de Editor IA para Documentários</h1>
      <p>
        Fluxo guiado para criar vídeos no estilo documental com consistência de estética,
        roteiro e narração.
      </p>
    </header>

    <main>
      <section class="panel">
        <h2>1) Brief do episódio</h2>
        <div class="grid">
          <label>
            Tema
            <input id="theme" value="A queda do Império Romano" />
          </label>
          <label>
            Tipo de episódio
            <select id="episodeType">
              <option>Evento histórico</option>
              <option>Biografia</option>
              <option>Mistério histórico</option>
            </select>
          </label>
          <label>
            Duração alvo
            <select id="duration">
              <option>8 min</option>
              <option selected>12 min</option>
              <option>20 min</option>
            </select>
          </label>
        </div>
      </section>

      <section class="panel">
        <h2>2) Style DNA (consistência visual/sonora)</h2>
        <div class="grid">
          <label>
            Paleta
            <select id="palette">
              <option selected>History Gold</option>
              <option>BBC Cold Blue</option>
              <option>Archive Sepia</option>
            </select>
          </label>
          <label>
            Narração
            <select id="voice">
              <option selected>Masculina grave</option>
              <option>Feminina clara</option>
              <option>Neutra jornalística</option>
            </select>
          </label>
          <label>
            Intensidade trilha
            <input id="music" type="range" min="1" max="10" value="6" />
          </label>
        </div>
        <button id="saveStyle">Salvar preset no banco</button>
      </section>

      <section class="panel">
        <h2>3) Copiloto IA</h2>
        <div class="actions">
          <button id="generateScript">Gerar roteiro</button>
          <button id="generateNarration">Gerar narração</button>
          <button id="autoCut">Montar rough cut</button>
        </div>
        <pre id="output" aria-live="polite">Aguardando ação...</pre>
      </section>

      <section class="panel">
        <h2>4) Banco de consistência (simulado)</h2>
        <ul id="styleDB"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
