<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumuns Prototype — Jogo 3D Naruto Style</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="game"></div>

    <div class="hud hud-left panel-pixel">
      <div class="hud-title">CHAKRA</div>
      <div class="chakra-row">
        <span class="chakra-dot off"></span>
        <span class="chakra-dot on"></span>
      </div>
      <div class="chakra-bar">
        <div id="chakraFill" class="chakra-fill"></div>
      </div>
    </div>

    <div class="hud hud-right panel-pixel">
      <div>SCORE: <span id="score">000</span></div>
      <div>TIME: <span id="time">6:09</span></div>
    </div>

    <div class="controls panel-pixel">WASD: Mover | SPACE: Pular</div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="script.js"></script>
  </body>
</html>
