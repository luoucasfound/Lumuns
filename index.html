<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuGen Pro: AI Video Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #render-canvas { background: #000; width: 100%; aspect-ratio: 16/9; border-radius: 0.75rem; }
        .recording-pulse { animation: pulse 1s infinite; color: #ef4444; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .progress-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-6xl mx-auto space-y-6">
        <header class="flex justify-between items-end border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-blue-500 mono uppercase">DocuGen PRO // GPU RENDERER</h1>
                <p class="text-slate-500 text-[10px] mono uppercase tracking-widest">Hybrid AI/Local Video Synthesis</p>
            </div>
            <div id="rec-indicator" class="hidden flex items-center gap-2 mono text-[10px] font-bold">
                <span class="recording-pulse">●</span> EXPORTANDO VÍDEO...
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-8 space-y-4">
                <div class="glass p-2 rounded-xl shadow-2xl relative overflow-hidden">
                    <canvas id="render-canvas"></canvas>

                    <div id="progress-overlay" class="absolute bottom-4 left-4 right-4 p-4 glass rounded-lg translate-y-20 opacity-0 transition-all duration-500">
                        <div class="flex justify-between items-center mb-2">
                            <span id="progress-status" class="text-[10px] mono text-blue-400 font-bold uppercase">Aguardando...</span>
                            <span id="progress-percent" class="text-[10px] mono text-slate-400">0%</span>
                        </div>
                        <div class="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden">
                            <div id="progress-bar" class="w-0 h-full bg-blue-500 transition-all duration-300 progress-glow"></div>
                        </div>
                    </div>
                </div>

                <div id="drop-zone" class="border-2 border-dashed border-slate-700 rounded-xl p-10 text-center cursor-pointer hover:bg-slate-800/30 transition-all">
                    <p class="mono text-xs text-slate-400 font-bold uppercase">Upload Manifesto (.TXT)</p>
                    <p class="text-[10px] text-slate-600 mt-1 uppercase">Processamento local + APIs gratuitas</p>
                    <input type="file" id="file-input" class="hidden" accept=".txt">
                </div>
            </div>

            <div class="lg:col-span-4 space-y-4">
                <div class="glass p-6 rounded-xl border border-slate-800 space-y-6">
                    <div>
                        <p class="text-[10px] mono text-blue-400 uppercase font-bold mb-4 tracking-tighter">Configurações de Engine</p>

                        <label class="block text-[10px] text-slate-500 mb-1 mono uppercase">Gemini API Key (opcional)</label>
                        <input id="gemini-key" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-xs mono mb-3 outline-none focus:border-blue-500 transition-colors" type="password" placeholder="AIza...">

                        <label class="block text-[10px] text-slate-500 mb-1 mono uppercase">Fonte de Imagem Principal</label>
                        <select id="image-source" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-xs mono mb-3 outline-none focus:border-blue-500 transition-colors">
                            <option value="auto">Auto Mix (Wikimedia + Picsum + APIs)</option>
                            <option value="wikimedia">Wikimedia Commons (grátis)</option>
                            <option value="picsum">Picsum Seeded (grátis)</option>
                            <option value="pexels">Pexels (API key)</option>
                            <option value="pixabay">Pixabay (API key)</option>
                        </select>

                        <div class="grid grid-cols-1 gap-3 mb-3">
                            <div>
                                <label class="block text-[10px] text-slate-500 mb-1 mono uppercase">Pexels API Key (opcional)</label>
                                <input id="pexels-key" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-xs mono outline-none focus:border-blue-500 transition-colors" type="password" placeholder="563492ad...">
                            </div>
                            <div>
                                <label class="block text-[10px] text-slate-500 mb-1 mono uppercase">Pixabay API Key (opcional)</label>
                                <input id="pixabay-key" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-xs mono outline-none focus:border-blue-500 transition-colors" type="password" placeholder="Sua key grátis">
                            </div>
                        </div>

                        <label class="block text-[10px] text-slate-500 mb-1 mono uppercase">Motor de Voz</label>
                        <select id="tts-provider" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-xs mono mb-3 outline-none focus:border-blue-500 transition-colors">
                            <option value="browser">Web Speech (nativo)</option>
                            <option value="streamelements">StreamElements TTS (grátis)</option>
                        </select>

                        <label class="block text-[10px] text-slate-500 mb-1 mono uppercase">Voz do Narrador</label>
                        <select id="voice-select" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-xs mono mb-2 outline-none focus:border-blue-500 transition-colors"></select>
                        <label class="flex items-center gap-2 text-[10px] text-slate-500 mono uppercase mt-2 mb-3">
                            <input type="checkbox" id="mute-tts" class="accent-blue-500">
                            Sem Narração (Modo Visual)
                        </label>

                        <label class="block text-[10px] text-slate-500 mb-1 mono uppercase">Estilo Visual</label>
                        <select id="style-select" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-xs mono outline-none focus:border-blue-500 transition-colors">
                            <option value="cinematic">Cinemático Profundo</option>
                            <option value="noir">Noir Forense (P&B)</option>
                            <option value="glitch">Digital Decay</option>
                        </select>
                    </div>

                    <div class="pt-4 border-t border-slate-800 space-y-2">
                        <button id="preview-btn" class="w-full bg-slate-800 hover:bg-slate-700 py-3 rounded-lg font-black mono text-xs transition-all shadow-lg disabled:opacity-30 disabled:cursor-not-allowed" disabled>
                            PREVIEW (2 CENAS)
                        </button>
                        <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-lg font-black mono text-sm transition-all shadow-lg disabled:opacity-30 disabled:cursor-not-allowed" disabled>
                            GERAR DOCUMENTÁRIO & VÍDEO
                        </button>
                        <button id="stop-btn" class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-black mono text-xs transition-all shadow-lg disabled:opacity-30 disabled:cursor-not-allowed" disabled>
                            STOP
                        </button>
                    </div>
                </div>

                <div class="glass p-4 rounded-xl h-64 overflow-hidden flex flex-col border border-slate-800">
                    <p class="text-[10px] mono text-blue-500 mb-2 font-bold uppercase tracking-widest text-center">Engine Diagnostics</p>
                    <div id="log" class="flex-grow overflow-y-auto text-[9px] mono text-slate-500 space-y-1 custom-scroll">
                        <div class="text-slate-700">// System ready. Waiting for input.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('log');
        const startBtn = document.getElementById('start-btn');
        const previewBtn = document.getElementById('preview-btn');
        const stopBtn = document.getElementById('stop-btn');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const voiceSelect = document.getElementById('voice-select');
        const ttsProviderSelect = document.getElementById('tts-provider');
        const imageSourceSelect = document.getElementById('image-source');

        const progressOverlay = document.getElementById('progress-overlay');
        const progressBar = document.getElementById('progress-bar');
        const progressStatus = document.getElementById('progress-status');
        const progressPercent = document.getElementById('progress-percent');

        const streamElementsVoices = [
            'Ricardo', 'Mia', 'Conchita', 'Cristiano', 'Vitoria', 'Camila', 'Miguel', 'Penelope'
        ];

        let scriptSteps = [];
        let isProcessing = false;
        let mediaRecorder;
        let recordedChunks = [];
        let currentImg = new Image();
        currentImg.crossOrigin = 'anonymous';

        let currentText = '';
        let zoom = 1;
        let activeAudio = null;
        let sceneStartAt = 0;
        let sceneDurationMs = 8000;
        const MAX_SCENE_DURATION_MS = 5 * 60 * 1000;
        const MAX_SCENES = 25;
        const providerWarningsShown = new Set();

        canvas.width = 1280;
        canvas.height = 720;

        function addLog(msg, type = 'default') {
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString('pt-BR', { hour12: false });
            div.className = type === 'error' ? 'text-red-500 font-bold' : 'text-slate-500';
            div.innerText = `[${time}] > ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function getGeminiKey() {
            return document.getElementById('gemini-key').value.trim();
        }

        function getPexelsKey() {
            return document.getElementById('pexels-key').value.trim();
        }

        function getPixabayKey() {
            return document.getElementById('pixabay-key').value.trim();
        }

        const synth = window.speechSynthesis;
        function loadVoices() {
            if (ttsProviderSelect.value === 'streamelements') {
                voiceSelect.innerHTML = streamElementsVoices
                    .map(v => `<option value="${v}">${v} (StreamElements)</option>`).join('');
                return;
            }
            const voices = synth.getVoices();
            voiceSelect.innerHTML = voices
                .map(v => `<option value="${v.name}">${v.name} (${v.lang})</option>`).join('');
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        ttsProviderSelect.onchange = () => {
            loadVoices();
            saveSettings();
            addLog(`Motor de voz alterado para: ${ttsProviderSelect.value}`);
        };

        loadVoices();

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (ev) => {
                const text = ev.target.result;
                addLog('Iniciando análise do manifesto...');
                scriptSteps = await processScriptWithAI(text);
                if (scriptSteps && scriptSteps.length > 0) {
                    addLog(`Roteiro estruturado: ${scriptSteps.length} cenas identificadas.`);
                    startBtn.disabled = false;
                    previewBtn.disabled = false;
                    dropZone.classList.add('hidden');
                } else {
                    addLog('Erro estrutural no manifesto. Reprocessando...', 'error');
                }
            };
            reader.readAsText(file);
        };

        function normalizeSearchTerm(text) {
            const ptToEn = {
                guerra: 'war', ditadura: 'dictatorship', floresta: 'forest', amazonia: 'amazon rainforest', oceano: 'ocean',
                cidade: 'city', favela: 'favela', economia: 'economy', inflação: 'inflation', inflacao: 'inflation',
                política: 'politics', politica: 'politics', ciência: 'science', ciencia: 'science', tecnologia: 'technology',
                medicina: 'medicine', hospital: 'hospital', educação: 'education', educacao: 'education', escola: 'school',
                polícia: 'police', policia: 'police', tribunal: 'courtroom', crime: 'crime scene', migração: 'migration', migracao: 'migration',
                indígena: 'indigenous people', indigena: 'indigenous people', seca: 'drought', enchente: 'flood', terremoto: 'earthquake',
                energia: 'energy infrastructure', petróleo: 'oil industry', petroleo: 'oil industry', mineração: 'mining', mineracao: 'mining',
                trabalho: 'workers', fábrica: 'factory', fabrica: 'factory', protesto: 'street protest', democracia: 'democracy',
                agricultura: 'agriculture', satélite: 'satellite', satelite: 'satellite'
            };
            const stopwords = new Set(['a','o','as','os','de','da','do','das','dos','e','em','na','no','nas','nos','com','para','por','que','se','um','uma','ao','aos','às','é','foi','ser','como']);
            const tokens = (text || '')
                .toLowerCase()
                .normalize('NFD').replace(/[̀-ͯ]/g, '')
                .replace(/[^a-z0-9\s]/g, ' ')
                .split(/\s+/)
                .filter(t => t.length > 2 && !stopwords.has(t));

            const mapped = [];
            for (const token of tokens) {
                mapped.push(ptToEn[token] || token);
                if (mapped.length >= 8) break;
            }

            const finalTokens = mapped.length ? mapped : ['documentary', 'historical', 'realistic', 'cinematic'];
            return finalTokens.join(' ');
        }

        function chunkFallbackScenes(rawText) {
            const paragraphs = rawText
                .split(/\n+/)
                .map(t => t.trim())
                .filter(Boolean);
            const base = paragraphs.length ? paragraphs : rawText.split(/[.!?]+/).map(t => t.trim()).filter(Boolean);

            const scenes = [];
            let bucket = '';
            for (const part of base) {
                const merged = `${bucket} ${part}`.trim();
                if (merged.length <= 240) {
                    bucket = merged;
                } else {
                    if (bucket) scenes.push(bucket);
                    bucket = part;
                }
            }
            if (bucket) scenes.push(bucket);

            return scenes.slice(0, MAX_SCENES).map(text => ({ text, search: normalizeSearchTerm(text) }));
        }

        async function processScriptWithAI(rawText) {
            const apiKey = getGeminiKey();
            if (!apiKey) {
                addLog('Gemini sem chave. Fallback heurístico semântico ativado.');
                return chunkFallbackScenes(rawText);
            }

            const systemPrompt = 'Você é um diretor de documentários sênior. Divida o texto em no máximo 40 cenas cinematográficas. Cada cena precisa de narração em pt-BR e busca visual em inglês realista, específica e curta.';
            const userPrompt = `Analise e fragmente este texto em cenas. Retorne JSON: [{"text": "narração em PT-BR", "search": "english realistic visual query"}]\n\nTEXTO: ${rawText}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userPrompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: 'application/json', temperature: 0.1 }
                    })
                });

                const data = await response.json();
                let resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                resultText = resultText?.replace(/```json/g, '').replace(/```/g, '').trim();
                if (!resultText) throw new Error('Resposta vazia da Gemini.');

                const parsed = JSON.parse(resultText)
                    .slice(0, MAX_SCENES)
                    .map(step => ({
                        text: (step.text || '').trim(),
                        search: (step.search || normalizeSearchTerm(step.text)).trim()
                    }))
                    .filter(step => step.text.length > 0);

                if (!parsed.length) throw new Error('Gemini retornou cenas inválidas.');
                return parsed;
            } catch (e) {
                addLog(`Fallback local ativado: ${e.message}`, 'error');
                return chunkFallbackScenes(rawText);
            }
        }


        function buildSceneQueries(step) {
            const rawText = (step?.text || '').trim();
            const rawSearch = (step?.search || '').trim();
            const normalizedFromSearch = normalizeSearchTerm(rawSearch);
            const normalizedFromText = normalizeSearchTerm(rawText);
            const normalizedCombined = normalizeSearchTerm(`${rawSearch} ${rawText}`);

            const variants = [
                normalizedFromSearch,
                normalizedCombined,
                normalizedFromText,
                `${normalizedFromSearch} documentary photojournalism`,
                `${normalizedFromText} realistic photography`
            ].map(v => (v || '').trim()).filter(Boolean);

            const lowered = `${rawSearch} ${rawText}`.toLowerCase();
            if (/\b(19\d{2}|20\d{2})\b/.test(lowered)) {
                variants.push(`${normalizedCombined} historical archive photo`);
            }
            if (/guerra|conflito|battle|war|militar|army/.test(lowered)) {
                variants.push(`${normalizedCombined} war documentary photography`);
            }
            if (/ci[eê]ncia|laborat[oó]rio|tecnologia|space|satellite/.test(lowered)) {
                variants.push(`${normalizedCombined} science documentary photo`);
            }
            if (/floresta|natureza|clima|oceano|amaz[oô]nia|rainforest/.test(lowered)) {
                variants.push(`${normalizedCombined} environmental documentary photo`);
            }

            return [...new Set(variants)].slice(0, 7);
        }

        async function loadImageFromWikimedia(search) {
            async function queryWikimedia(term) {
                const query = encodeURIComponent(term);
                const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${query}&gsrlimit=25&gsrnamespace=6&prop=imageinfo&iiprop=url&format=json&origin=*`;
                const response = await fetch(url);
                const data = await response.json();
                const pages = Object.values(data?.query?.pages || {});
                return pages
                    .map(p => p.imageinfo?.[0]?.url)
                    .filter(Boolean)
                    .filter(u => /\.(jpg|jpeg|png|webp)$/i.test(u));
            }

            const baseQuery = search || 'documentary realistic photo';
            const strictCandidates = await queryWikimedia(`${baseQuery} filetype:bitmap`);
            const broadCandidates = strictCandidates.length ? strictCandidates : await queryWikimedia(baseQuery);
            if (broadCandidates.length === 0) throw new Error('sem resultados para o tema');
            return broadCandidates[Math.floor(Math.random() * Math.min(broadCandidates.length, 10))];
        }

        async function loadImageFromPexels(search) {
            const key = getPexelsKey();
            if (!key) return null;
            const query = encodeURIComponent(search || 'documentary realistic scene');
            const response = await fetch(`https://api.pexels.com/v1/search?query=${query}&per_page=15&orientation=landscape`, {
                headers: { Authorization: key }
            });
            const data = await response.json();
            const photo = data?.photos?.[Math.floor(Math.random() * (data?.photos?.length || 0))];
            return photo?.src?.landscape || photo?.src?.large || null;
        }

        async function loadImageFromPixabay(search) {
            const key = getPixabayKey();
            if (!key) return null;
            const query = encodeURIComponent(search || 'documentary realistic scene');
            const response = await fetch(`https://pixabay.com/api/?key=${key}&q=${query}&image_type=photo&per_page=20&safesearch=true`);
            const data = await response.json();
            const hit = data?.hits?.[Math.floor(Math.random() * (data?.hits?.length || 0))];
            return hit?.largeImageURL || hit?.webformatURL || null;
        }

        function loadImageFromPicsum(search) {
            const seed = encodeURIComponent((search || 'history').slice(0, 80));
            return `https://picsum.photos/seed/${seed}/1280/720?grayscale=${document.getElementById('style-select').value === 'noir' ? 1 : 0}`;
        }

        function providerUnavailableOnce(provider, reason, level = 'warning') {
            const key = `${provider}:${reason}`;
            if (providerWarningsShown.has(key)) return;
            providerWarningsShown.add(key);
            const msg = `Fonte ${provider} indisponível: ${reason}`;
            addLog(msg, level === 'error' ? 'error' : 'default');
        }

        async function resolveSceneImage(step) {
            const source = imageSourceSelect.value;
            const hasPexels = Boolean(getPexelsKey());
            const hasPixabay = Boolean(getPixabayKey());
            const queries = buildSceneQueries(step);

            const chain = [];
            if (source === 'auto' || source === 'wikimedia') chain.push({ name: 'Wikimedia', fn: loadImageFromWikimedia });
            if ((source === 'auto' || source === 'pexels') && hasPexels) chain.push({ name: 'Pexels', fn: loadImageFromPexels });
            if ((source === 'auto' || source === 'pixabay') && hasPixabay) chain.push({ name: 'Pixabay', fn: loadImageFromPixabay });
            if (source === 'picsum') chain.push({ name: 'Picsum', fn: (q) => Promise.resolve(loadImageFromPicsum(q)) });
            if (!chain.length || source === 'auto') chain.push({ name: 'Picsum', fn: (q) => Promise.resolve(loadImageFromPicsum(q)) });

            if (source === 'pexels' && !hasPexels) providerUnavailableOnce('Pexels', 'API key não configurada (opcional)');
            if (source === 'pixabay' && !hasPixabay) providerUnavailableOnce('Pixabay', 'API key não configurada (opcional)');

            for (const query of queries) {
                for (const loader of chain) {
                    try {
                        const url = await loader.fn(query);
                        if (url) return { url, provider: loader.name, query };
                        if (source !== 'auto') providerUnavailableOnce(loader.name, `sem resultados para: ${query}`);
                    } catch (error) {
                        if (source !== 'auto') providerUnavailableOnce(loader.name, `${error.message} (${query})`, 'error');
                    }
                }
            }

            const fallbackQuery = queries[0] || normalizeSearchTerm(step?.text || step?.search || 'history');
            return { url: loadImageFromPicsum(fallbackQuery), provider: 'Picsum', query: fallbackQuery };
        }


        function estimateSceneDurationMs(text) {
            const words = (text || '').trim().split(/\s+/).filter(Boolean).length;
            const narrationMs = Math.max(6000, (words / 2.6) * 1000 + 1500);
            return Math.min(narrationMs, MAX_SCENE_DURATION_MS);
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        async function speakWithLimit(text, maxMs) {
            let timeoutId;
            const timeoutPromise = new Promise((resolve) => {
                timeoutId = setTimeout(() => {
                    synth.cancel();
                    if (activeAudio) {
                        activeAudio.pause();
                        activeAudio = null;
                    }
                    addLog('Limite de 5 minutos atingido para a cena. Avançando automaticamente.', 'error');
                    resolve();
                }, maxMs);
            });

            await Promise.race([speak(text), timeoutPromise]);
            clearTimeout(timeoutId);
        }

        function renderLoop() {
            if (!isProcessing) return;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const style = document.getElementById('style-select').value;
            const elapsed = Math.max(0, performance.now() - sceneStartAt);
            const t = Math.min(1, elapsed / Math.max(sceneDurationMs, 1));
            const eased = easeInOutCubic(t);

            if (currentImg.complete && currentImg.src) {
                const baseZoom = 1.02;
                const zoomGain = style === 'cinematic' ? 0.2 : style === 'glitch' ? 0.14 : 0.1;
                const panX = Math.sin(elapsed / 4200) * 30;
                const panY = Math.cos(elapsed / 5200) * 18;

                zoom = Math.min(baseZoom + zoomGain * eased, 1.18);
                const w = canvas.width * zoom;
                const h = canvas.height * zoom;
                const x = (canvas.width - w) / 2 + panX;
                const y = (canvas.height - h) / 2 + panY;

                ctx.drawImage(currentImg, x, y, w, h);

                // Fake parallax layer (cinema-grade motion feel)
                ctx.globalAlpha = 0.12;
                ctx.drawImage(currentImg, x - 40 * (1 - eased), y - 20 * (1 - eased), w * 1.01, h * 1.01);
                ctx.globalAlpha = 1;
            }

            if (style === 'cinematic') {
                const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, 'rgba(8, 16, 32, 0.15)');
                grad.addColorStop(0.5, 'rgba(4, 8, 20, 0.2)');
                grad.addColorStop(1, 'rgba(2, 4, 12, 0.32)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (style === 'noir') {
                ctx.globalCompositeOperation = 'saturation';
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (style === 'glitch') {
                const noise = Math.floor(Math.random() * 50);
                ctx.fillStyle = `rgba(${noise}, 0, ${noise + 40}, 0.12)`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (Math.random() > 0.88) {
                    const y = Math.random() * canvas.height;
                    ctx.fillStyle = 'rgba(59,130,246,0.15)';
                    ctx.fillRect(0, y, canvas.width, 3 + Math.random() * 4);
                }
            }

            // subtle vignette + film grain to emulate professional AI video finishing
            const vignette = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, canvas.height * 0.18, canvas.width / 2, canvas.height / 2, canvas.height * 0.75);
            vignette.addColorStop(0, 'rgba(0,0,0,0)');
            vignette.addColorStop(1, 'rgba(0,0,0,0.28)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (Math.random() > 0.35) {
                ctx.fillStyle = 'rgba(255,255,255,0.03)';
                ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 1, 1);
            }

            if (currentText) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, canvas.height - 180, canvas.width, 180);
                ctx.font = 'bold 24px JetBrains Mono';
                ctx.fillStyle = '#3b82f6';
                ctx.textAlign = 'center';
                ctx.fillText('CORE ENGINE // RENDER ACTIVE', canvas.width / 2, canvas.height - 130);

                ctx.font = '22px Inter';
                ctx.fillStyle = '#f8fafc';
                const words = currentText.split(' ');
                let line = '', yPos = canvas.height - 80;
                for (let n = 0; n < words.length; n++) {
                    const testLine = line + words[n] + ' ';
                    if (testLine.length > 70 && n > 0) {
                        ctx.fillText(line, canvas.width / 2, yPos);
                        line = words[n] + ' ';
                        yPos += 35;
                    } else {
                        line = testLine;
                    }
                }
                ctx.fillText(line, canvas.width / 2, yPos);
            }
            requestAnimationFrame(renderLoop);
        }

        async function generateDocumentary() {
            if (isProcessing) return;
            isProcessing = true;
            recordedChunks = [];

            progressOverlay.classList.remove('translate-y-20', 'opacity-0');
            document.getElementById('rec-indicator').classList.remove('hidden');
            startBtn.disabled = true;
            previewBtn.disabled = true;
            stopBtn.disabled = false;

            addLog('GPU Pipeline: Iniciando stream de vídeo 60fps...');

            try {
                renderLoop();
                const stream = canvas.captureStream(60);
                let mimeType = 'video/webm; codecs=vp9';
                if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = 'video/webm';
                }

                mediaRecorder = new MediaRecorder(stream, {
                    mimeType,
                    videoBitsPerSecond: 8000000
                });

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };
                mediaRecorder.onstop = exportVideo;
                mediaRecorder.start();

                for (let i = 0; i < scriptSteps.length; i++) {
                    const step = scriptSteps[i];
                    const percent = Math.round(((i + 1) / scriptSteps.length) * 100);

                    progressStatus.innerText = `Cena ${i + 1} de ${scriptSteps.length} // Renderizando Visual`;
                    progressPercent.innerText = `${percent}%`;
                    progressBar.style.width = `${percent}%`;

                    addLog(`Render: ${step.search}`);
                    currentText = step.text;
                    sceneStartAt = performance.now();
                    sceneDurationMs = estimateSceneDurationMs(step.text);
                    zoom = 1.0;

                    addLog(`Cena ${i + 1}: limite máximo de 5 min (${Math.round(sceneDurationMs / 1000)}s planejados).`);

                    const imageAsset = await resolveSceneImage(step);
                    addLog(`Imagem carregada via: ${imageAsset.provider} | query: ${imageAsset.query}`);
                    currentImg.src = imageAsset.url;

                    await new Promise((resolve) => {
                        currentImg.onload = resolve;
                        currentImg.onerror = resolve;
                    });

                    await speakWithLimit(step.text, MAX_SCENE_DURATION_MS);
                }

                stopGeneration();
            } catch (err) {
                addLog(`FALHA NO CORE: ${err.message}`, 'error');
                isProcessing = false;
                startBtn.disabled = false;
                previewBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        function speakWithBrowser(text) {
            return new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(text);
                const voice = synth.getVoices().find(v => v.name === voiceSelect.value);
                if (voice) utterance.voice = voice;
                utterance.rate = 0.92;
                utterance.onend = () => setTimeout(resolve, 500);
                utterance.onerror = () => resolve();
                synth.speak(utterance);
            });
        }

        function speakWithStreamElements(text) {
            return new Promise((resolve) => {
                const voice = voiceSelect.value || 'Ricardo';
                const endpoint = `https://api.streamelements.com/kappa/v2/speech?voice=${encodeURIComponent(voice)}&text=${encodeURIComponent(text)}`;
                activeAudio = new Audio(endpoint);
                activeAudio.onended = () => setTimeout(resolve, 300);
                activeAudio.onerror = () => {
                    addLog('Falha no StreamElements TTS. Voltando ao Web Speech.', 'error');
                    speakWithBrowser(text).then(resolve);
                };
                activeAudio.play().catch(() => {
                    addLog('Autoplay bloqueado pelo navegador. Voltando ao Web Speech.', 'error');
                    speakWithBrowser(text).then(resolve);
                });
            });
        }

        async function speak(text) {
            const mute = document.getElementById('mute-tts').checked;
            if (mute) {
                await new Promise(resolve => setTimeout(resolve, 6000));
                return;
            }

            if (ttsProviderSelect.value === 'streamelements') {
                return speakWithStreamElements(text);
            }
            return speakWithBrowser(text);
        }

        async function previewDocumentary() {
            if (isProcessing || !scriptSteps.length) return;

            isProcessing = true;
            startBtn.disabled = true;
            previewBtn.disabled = true;
            stopBtn.disabled = false;
            addLog('Preview Mode: renderizando 2 cenas sem exportação.');
            renderLoop();

            try {
                for (let i = 0; i < Math.min(2, scriptSteps.length); i++) {
                    const step = scriptSteps[i];
                    currentText = step.text;
                    sceneStartAt = performance.now();
                    sceneDurationMs = estimateSceneDurationMs(step.text);
                    zoom = 1.0;

                    const imageAsset = await resolveSceneImage(step);
                    currentImg.src = imageAsset.url;

                    await new Promise((resolve) => {
                        currentImg.onload = resolve;
                        currentImg.onerror = resolve;
                    });

                    await speakWithLimit(step.text, MAX_SCENE_DURATION_MS);
                }
            } finally {
                isProcessing = false;
                startBtn.disabled = false;
                previewBtn.disabled = false;
                stopBtn.disabled = true;
                addLog('Preview concluído.');
            }
        }

        function stopGeneration(trigger = 'auto') {
            if (!isProcessing && trigger === 'manual') {
                addLog('Nenhuma geração ativa para interromper.');
                return;
            }

            isProcessing = false;
            synth.cancel();
            if (activeAudio) {
                activeAudio.pause();
                activeAudio = null;
            }
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            progressOverlay.classList.add('translate-y-20', 'opacity-0');
            document.getElementById('rec-indicator').classList.add('hidden');
            startBtn.disabled = false;
            previewBtn.disabled = false;
            stopBtn.disabled = true;
            addLog(trigger === 'manual' ? 'Geração interrompida manualmente. Finalizando exportação.' : 'Processamento local concluído. Salvando documento em vídeo.');
        }

        function exportVideo() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `render_final_${Date.now()}.webm`;
            a.click();
            addLog('DOCUMENTO EXPORTADO VIA GPU.');
        }

        function saveSettings() {
            localStorage.setItem('docugen_style', document.getElementById('style-select').value);
            localStorage.setItem('docugen_image', imageSourceSelect.value);
            localStorage.setItem('docugen_tts', ttsProviderSelect.value);
            localStorage.setItem('docugen_mute', document.getElementById('mute-tts').checked ? '1' : '0');
        }

        function loadSettings() {
            const style = localStorage.getItem('docugen_style');
            const image = localStorage.getItem('docugen_image');
            const tts = localStorage.getItem('docugen_tts');
            const mute = localStorage.getItem('docugen_mute');

            if (style) document.getElementById('style-select').value = style;
            if (image) imageSourceSelect.value = image;
            if (tts) ttsProviderSelect.value = tts;
            if (mute) document.getElementById('mute-tts').checked = mute === '1';
        }

        document.getElementById('style-select').onchange = saveSettings;
        imageSourceSelect.onchange = saveSettings;
        document.getElementById('mute-tts').onchange = saveSettings;

        loadSettings();
        loadVoices();

        startBtn.onclick = generateDocumentary;
        previewBtn.onclick = previewDocumentary;
        stopBtn.onclick = () => stopGeneration('manual');
    </script>
</body>
</html>
